<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkAtlas — Atracciones</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #ffd166;
    --text: #f0f0f5;
    --muted: #7070a0;
    --green: #06d6a0;
    --blue: #118ab2;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%);
    padding: 20px 16px 16px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .add-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 50%; width: 44px; height: 44px;
    font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(255,77,109,0.4);
    transition: transform .15s, box-shadow .15s;
  }
  .add-btn:active { transform: scale(.92); }
  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input {
    width: 100%; padding: 11px 16px 11px 42px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }
  /* FILTERS */
  .filters-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  }
  .filters-scroll::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap; padding: 6px 14px;
    border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: .82rem; cursor: pointer; font-weight: 500;
    transition: all .15s;
  }
  .chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  /* PARK TABS */
  .park-tabs {
    display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 0;
  }
  .park-tabs::-webkit-scrollbar { display: none; }
  .park-tab {
    white-space: nowrap; padding: 6px 14px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: .8rem; cursor: pointer; font-weight: 500;
    transition: all .15s;
  }
  .park-tab.active {
    border-color: var(--accent2); color: var(--accent2); background: rgba(255,209,102,.08);
  }
  /* STATS BAR */
  .stats { padding: 10px 16px; color: var(--muted); font-size: .83rem; }
  /* GRID */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 12px;
  }
  @media(max-width:380px) { .grid { grid-template-columns: 1fr; } }
  /* CARD */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    position: relative;
  }
  .card:active { transform: scale(.97); }
  .card-img {
    width: 100%; height: 130px; object-fit: cover;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,.7); color: var(--accent2);
    font-size: .7rem; padding: 3px 8px; border-radius: 99px;
    font-weight: 700; letter-spacing: .5px; backdrop-filter: blur(4px);
  }
  .card-fav {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,.6); border: none; border-radius: 50%;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: .9rem; backdrop-filter: blur(4px);
    transition: transform .15s;
  }
  .card-fav:active { transform: scale(1.3); }
  .card-body { padding: 10px; }
  .card-name {
    font-weight: 700; font-size: .9rem; margin-bottom: 3px;
    line-height: 1.2;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-park { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: .68rem; padding: 2px 7px; border-radius: 4px;
    font-weight: 600;
  }
  .tag-thrill { background: rgba(255,77,109,.15); color: var(--accent); }
  .tag-family { background: rgba(6,214,160,.15); color: var(--green); }
  .tag-show { background: rgba(17,138,178,.15); color: var(--blue); }
  .tag-water { background: rgba(118,148,255,.15); color: #7694ff; }
  .tag-kids { background: rgba(255,209,102,.15); color: var(--accent2); }
  .tag-dark { background: rgba(180,100,255,.15); color: #b464ff; }
  /* EMPTY */
  .empty {
    text-align: center; padding: 60px 16px; color: var(--muted);
    grid-column: 1/-1;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  /* FAB */
  /* MODAL OVERLAY */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    z-index: 200; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 20px 16px 40px; border: 1px solid var(--border);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 99px; margin: 0 auto 20px;
  }
  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 1px; margin-bottom: 16px;
    color: var(--accent2);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: .92rem;
    outline: none; font-family: inherit;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group select option { background: var(--card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #ff6b8a);
    border: none; border-radius: 12px; color: #fff;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 1.1rem;
    transition: opacity .15s;
    margin-top: 8px;
  }
  .btn-primary:active { opacity: .85; }
  .btn-danger {
    width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--accent);
    border-radius: 12px; color: var(--accent);
    font-size: .95rem; cursor: pointer; margin-top: 8px;
    transition: background .15s;
  }
  .btn-danger:active { background: rgba(255,77,109,.1); }
  /* DETAIL MODAL */
  .detail-img {
    width: 100%; height: 200px; object-fit: cover; border-radius: 12px;
    margin-bottom: 16px; background: var(--card);
    display: flex; align-items: center; justify-content: center; font-size: 5rem;
  }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 1px; line-height: 1.1;
  }
  .detail-park { color: var(--accent2); font-size: .9rem; font-weight: 600; margin: 4px 0 12px; }
  .detail-desc { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 14px; }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .meta-item {
    background: var(--card); border-radius: 10px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .meta-label { font-size: .72rem; color: var(--muted); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .meta-val { font-size: .95rem; font-weight: 700; margin-top: 2px; }
  .action-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-edit, .btn-del {
    flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .btn-edit { background: var(--card); color: var(--text); }
  .btn-del { background: transparent; color: var(--accent); border-color: var(--accent); }
  .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem;
  }
  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 10px 0 16px;
    z-index: 150;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .65rem; font-weight: 600; letter-spacing: .5px;
    text-transform: uppercase; padding: 0 12px;
    transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 1.3rem; }
  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #000; padding: 10px 20px;
    border-radius: 99px; font-weight: 700; font-size: .88rem;
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🎢 ParkAtlas</h1>
    <button class="add-btn" onclick="openAddModal()" title="Añadir atracción">＋</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar atracción…" oninput="render()">
  </div>
  <div class="filters-scroll" id="catFilters"></div>
</header>

<div class="park-tabs" id="parkTabs"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeOnBg(event,'detailOverlay')">
  <div class="modal" id="detailModal">
    <div class="modal-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="formOverlay" onclick="closeOnBg(event,'formOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="formTitle">Nueva Atracción</h2>
    <form id="attrForm" onsubmit="saveAttraction(event)">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="f_name" required placeholder="Nombre de la atracción">
      </div>
      <div class="form-group">
        <label>Parque *</label>
        <select id="f_park" required>
          <option value="">Seleccionar parque…</option>
          <option>Disneyland Paris</option>
          <option>Walt Disney Studios</option>
          <option>Universal Studios Hollywood</option>
          <option>Universal Orlando</option>
          <option>Puy du Fou Francia</option>
          <option>Puy du Fou España</option>
          <option>Futuroscope</option>
          <option>Europa-Park</option>
          <option>Tivoli Gardens</option>
          <option>Efteling</option>
          <option>Phantasialand</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select id="f_cat">
            <option>Montaña rusa</option>
            <option>Agua</option>
            <option>Show</option>
            <option>Familia</option>
            <option>Niños</option>
            <option>Dark ride</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo de emoción</label>
          <select id="f_thrill">
            <option>Thrill</option>
            <option>Family</option>
            <option>Kids</option>
            <option>Show</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>País</label>
          <select id="f_country">
            <option>Francia</option>
            <option>España</option>
            <option>USA</option>
            <option>Alemania</option>
            <option>Dinamarca</option>
            <option>Países Bajos</option>
            <option>Bélgica</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duración (min)</label>
          <input type="number" id="f_duration" placeholder="5" min="1" max="120">
        </div>
      </div>
      <div class="form-group">
        <label>Altura mínima (cm)</label>
        <input type="number" id="f_height" placeholder="Sin restricción" min="0" max="200">
      </div>
      <div class="form-group">
        <label>URL Foto</label>
        <input type="url" id="f_photo" placeholder="https://…">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="f_desc" rows="3" placeholder="Describe la atracción…"></textarea>
      </div>
      <input type="hidden" id="f_id">
      <button type="submit" class="btn-primary">💾 GUARDAR</button>
      <button type="button" class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteAttraction()">🗑️ Eliminar atracción</button>
      <button type="button" class="btn-danger" style="margin-top:6px" onclick="closeModal('formOverlay')">Cancelar</button>
    </form>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="setView('all',this)">
    <span class="icon">🎡</span>Todas
  </button>
  <button class="nav-btn" onclick="setView('fav',this)">
    <span class="icon">❤️</span>Favoritas
  </button>
  <button class="nav-btn" onclick="setView('map',this)">
    <span class="icon">🗺️</span>Parques
  </button>
</div>

  {id:27,name:"Piraten",park:"Tivoli Gardens",country:"Dinamarca",cat:"Agua",thrill:"Family",height:95,duration:4,desc:"Atracción de barcos con caída de agua pirata.",photo:"",fav:false},

  // EFTELING
  {id:28,name:"Baron 1898",park:"Efteling",country:"Países Bajos",cat:"Agua",thrill:"Thrill",height:130,duration:4,desc:"Caída libre vertical de 37 metros con historia de minería en steampunk.",photo:"",fav:false},
  {id:29,name:"Symbolica",park:"Efteling",country:"Países Bajos",cat:"Dark ride",thrill:"Family",height:0,duration:13,desc:"Palacio mágico con vehículos autónomos y efectos espectaculares.",photo:"",fav:false},
  {id:30,name:"Joris en de Draak",park:"Efteling",country:"Países Bajos",cat:"Montaña rusa",thrill:"Thrill",height:120,duration:2,desc:"Duelo de dos montañas rusas de madera simultáneas.",photo:"",fav:false},
  {id:31,name:"Fata Morgana",park:"Efteling",country:"Países Bajos",cat:"Dark ride",thrill:"Family",height:0,duration:12,desc:"Viaje en barca por las Mil y Una Noches.",photo:"",fav:false},

  // PHANTASIALAND
  {id:32,name:"Taron",park:"Phantasialand",country:"Bélgica",cat:"Montaña rusa",thrill:"Thrill",height:120,duration:3,desc:"El lanzador más rápido de Europa con dos disparos y 117 km/h.",photo:"",fav:false},
  {id:33,name:"Black Mamba",park:"Phantasialand",country:"Bélgica",cat:"Montaña rusa",thrill:"Thrill",height:130,duration:2,desc:"Invertida suspendida en un ambiente africano inmersivo.",photo:"",fav:false},
  {id:34,name:"Klugheim",park:"Phantasialand",country:"Bélgica",cat:"Montaña rusa",thrill:"Thrill",height:120,duration:3,desc:"Área temática vikinga con Taron como atracción estrella.",photo:"",fav:false},
  {id:35,name:"Chiapas",park:"Phantasialand",country:"Bélgica",cat:"Agua",thrill:"Family",height:100,duration:5,desc:"Descenso fluvial con historia azteca y caída final espectacular.",photo:"",fav:false},
];

let attractions = JSON.parse(localStorage.getItem('parkAtlas') || 'null') || defaultData;
let favorites = JSON.parse(localStorage.getItem('parkAtlasFav') || '[]');
let activeView = 'all';
let activePark = 'Todos';
let activeCat = 'Todas';
let editId = null;

const CATS = ['Todas','Montaña rusa','Agua','Show','Familia','Niños','Dark ride'];
const PARKS = ['Todos','Disneyland Paris','Walt Disney Studios','Universal Studios Hollywood','Universal Orlando','Puy du Fou Francia','Puy du Fou España','Futuroscope','Europa-Park','Tivoli Gardens','Efteling','Phantasialand'];

function save() {
  localStorage.setItem('parkAtlas', JSON.stringify(attractions));
  localStorage.setItem('parkAtlasFav', JSON.stringify(favorites));
}

function isFav(id) { return favorites.includes(id); }

function toggleFav(id, e) {
  e.stopPropagation();
  if (isFav(id)) favorites = favorites.filter(f=>f!==id);
  else favorites.push(id);
  save(); render();
}

function setView(v, btn) {
  activeView = v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function buildFilters() {
  const catEl = document.getElementById('catFilters');
  catEl.innerHTML = CATS.map(c=>`
    <button class="chip ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>
  `).join('');

  const parkEl = document.getElementById('parkTabs');
  parkEl.innerHTML = PARKS.map(p=>`
    <button class="park-tab ${activePark===p?'active':''}" onclick="setPark('${p}')">${p}</button>
  `).join('');
}

function setCat(c) { activeCat=c; render(); }
function setPark(p) { activePark=p; render(); }

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return attractions.filter(a => {
    if (activeView==='fav' && !isFav(a.id)) return false;
    if (activePark!=='Todos' && a.park!==activePark) return false;
    if (activeCat!=='Todas' && a.cat!==activeCat) return false;
    if (q && !a.name.toLowerCase().includes(q) && !a.park.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return false;
    return true;
  });
}

function thrillClass(t) {
  const m = {Thrill:'thrill',Family:'family',Show:'show',Kids:'kids'};
  return m[t]||'family';
}

function catEmoji(cat) {
  const m = {'Montaña rusa':'🎢','Agua':'💧','Show':'🎭','Familia':'👨‍👩‍👧','Niños':'🎈','Dark ride':'🌑'};
  return m[cat]||'🎡';
}

function render() {
  buildFilters();
  const filtered = getFiltered();
  document.getElementById('stats').textContent = `${filtered.length} atracciones`;
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🎠</div><p>No se encontraron atracciones</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(a=>`
    <div class="card" onclick="openDetail(${a.id})">
      <div class="card-img">
        ${a.photo ? `<img src="${a.photo}" alt="${a.name}" onerror="this.parentNode.textContent='${catEmoji(a.cat)}'">` : catEmoji(a.cat)}
      </div>
      <span class="card-badge">${a.cat}</span>
      <button class="card-fav" onclick="toggleFav(${a.id},event)">${isFav(a.id)?'❤️':'🤍'}</button>
      <div class="card-body">
        <div class="card-name">${a.name}</div>
        <div class="card-park">📍 ${a.park}</div>
        <div class="card-tags">
          <span class="tag tag-${thrillClass(a.thrill)}">${a.thrill}</span>
          ${a.height>0?`<span class="tag tag-thrill">📏 ${a.height}cm</span>`:''}
          ${a.duration?`<span class="tag tag-family">⏱ ${a.duration}min</span>`:''}
        </div>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const a = attractions.find(x=>x.id===id);
  if (!a) return;
  const c = document.getElementById('detailContent');
  c.innerHTML = `
    <div class="detail-img">
      ${a.photo ? `<img src="${a.photo}" alt="${a.name}" onerror="this.parentNode.textContent='${catEmoji(a.cat)}'">` : catEmoji(a.cat)}
    </div>
    <div class="detail-title">${a.name}</div>
    <div class="detail-park">📍 ${a.park} · ${a.country}</div>
    <p class="detail-desc">${a.desc||'Sin descripción.'}</p>
    <div class="detail-meta">
      <div class="meta-item">
        <div class="meta-label">Categoría</div>
        <div class="meta-val">${a.cat}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Emoción</div>
        <div class="meta-val">${a.thrill}</div>
      </div>
      ${a.height>0?`<div class="meta-item"><div class="meta-label">Altura mín.</div><div class="meta-val">${a.height} cm</div></div>`:''}
      ${a.duration?`<div class="meta-item"><div class="meta-label">Duración</div><div class="meta-val">${a.duration} min</div></div>`:''}
    </div>
    <div class="action-row">
      <button class="btn-edit" onclick="openEditModal(${a.id})">✏️ Editar</button>
      <button class="btn-del" onclick="confirmDelete(${a.id})">🗑️ Borrar</button>
    </div>
    <button class="btn-primary" style="margin-top:10px" onclick="toggleFav(${a.id},{stopPropagation:()=>{}}); render(); closeModal('detailOverlay')">
      ${isFav(id)?'💔 Quitar de favoritas':'❤️ Añadir a favoritas'}
    </button>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function confirmDelete(id) {
  if (confirm('¿Eliminar esta atracción?')) {
    attractions = attractions.filter(a=>a.id!==id);
    save(); closeModal('detailOverlay'); render();
    toast('Atracción eliminada');
  }
}

function openAddModal() {
  editId = null;
  document.getElementById('attrForm').reset();
  document.getElementById('f_id').value = '';
  document.getElementById('formTitle').textContent = 'Nueva Atracción';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('formOverlay').classList.add('open');
}

function openEditModal(id) {
  const a = attractions.find(x=>x.id===id);
  if (!a) return;
  editId = id;
  document.getElementById('formTitle').textContent = 'Editar Atracción';
  document.getElementById('f_name').value = a.name;
  document.getElementById('f_park').value = a.park;
  document.getElementById('f_cat').value = a.cat;
  document.getElementById('f_thrill').value = a.thrill;
  document.getElementById('f_country').value = a.country;
  document.getElementById('f_duration').value = a.duration||'';
  document.getElementById('f_height').value = a.height||'';
  document.getElementById('f_photo').value = a.photo||'';
  document.getElementById('f_desc').value = a.desc||'';
  document.getElementById('f_id').value = id;
  document.getElementById('deleteBtn').style.display='block';
  closeModal('detailOverlay');
  document.getElementById('formOverlay').classList.add('open');
}

function saveAttraction(e) {
  e.preventDefault();
  const a = {
    name: document.getElementById('f_name').value.trim(),
    park: document.getElementById('f_park').value,
    cat: document.getElementById('f_cat').value,
    thrill: document.getElementById('f_thrill').value,
    country: document.getElementById('f_country').value,
    duration: parseInt(document.getElementById('f_duration').value)||0,
    height: parseInt(document.getElementById('f_height').value)||0,
    photo: document.getElementById('f_photo').value.trim(),
    desc: document.getElementById('f_desc').value.trim(),
    fav: false
  };
  const id = parseInt(document.getElementById('f_id').value);
  if (id) {
    const idx = attractions.findIndex(x=>x.id===id);
    attractions[idx] = {...attractions[idx], ...a};
    toast('Atracción actualizada ✓');
  } else {
    a.id = Date.now();
    attractions.unshift(a);
    toast('Atracción añadida ✓');
  }
  save(); closeModal('formOverlay'); render();
}

function deleteAttraction() {
  const id = parseInt(document.getElementById('f_id').value);
  if (id && confirm('¿Eliminar esta atracción?')) {
    attractions = attractions.filter(a=>a.id!==id);
    save(); closeModal('formOverlay'); render();
    toast('Eliminada ✓');
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function closeOnBg(e, id) {
  if (e.target.id===id) closeModal(id);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// INIT
render();
</script>
</body>
</html>
