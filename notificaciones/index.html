<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notificaciones JS</title>

<base href="https://vercel2026-mu.vercel.app/notificaciones/" />

    <link rel="icon" type="image/png" href="icon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg" />
    <link rel="shortcut icon" href="icon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="notification" />
    <link rel="manifest" href="icon/site.webmanifest" />

    <style>
html, body {
    touch-action: manipulation;
}


        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h1>🔔 Notificaciones</h1>

    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="mensaje" placeholder="Mensaje">
    <input type="number" id="delay" placeholder="Segundos de retraso">

    <button id="btnNoti">Lanzar Notificación</button>

   <script>
    // ✅ Registrar Service Worker
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js")
            .then(() => console.log("SW registrado"))
            .catch(err => console.log("Error SW:", err));
    }

    document.getElementById("btnNoti").addEventListener("click", () => {

        const titulo = document.getElementById("titulo").value || "Notificación";
        const mensaje = document.getElementById("mensaje").value || "Mensaje por defecto";
        const segundos = parseInt(document.getElementById("delay").value) || 0;

        if (!("Notification" in window)) {
            alert("Este navegador no soporta notificaciones");
            return;
        }

        const lanzarNotificacionSW = () => {
            navigator.serviceWorker.ready.then(reg => {
                setTimeout(() => {
                    reg.showNotification(titulo, {
                        body: mensaje,
                        icon: "icon/apple-touch-icon.png"
                    });
                }, segundos * 1000);
            });
        };

        if (Notification.permission === "granted") {
            lanzarNotificacionSW();
        } 
        else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permiso => {
                if (permiso === "granted") {
                    lanzarNotificacionSW();
                }
            });
        } 
        else {
            alert("Tienes bloqueadas las notificaciones 😢");
        }

    });
</script>

</body>
</html>
