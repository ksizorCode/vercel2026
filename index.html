<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones JS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h1>🔔 Notificaciones</h1>

    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="mensaje" placeholder="Mensaje">
    <input type="number" id="delay" placeholder="Segundos de retraso">

    <button id="btnNoti">Lanzar Notificación</button>

    <script>
        document.getElementById("btnNoti").addEventListener("click", () => {

            const titulo = document.getElementById("titulo").value || "Notificación";
            const mensaje = document.getElementById("mensaje").value || "Mensaje por defecto";
            const segundos = parseInt(document.getElementById("delay").value) || 0;

            if (!("Notification" in window)) {
                alert("Este navegador no soporta notificaciones");
                return;
            }

            const crearNotificacion = () => {
                const noti = new Notification(titulo, {
                    body: mensaje,
                    icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
                });

                noti.onclick = () => {
                    window.focus();
                    window.open("https://tuweb.com");
                };
            };

            const lanzarConDelay = () => {
                setTimeout(() => {
                    crearNotificacion();
                }, segundos * 1000);
            };

            if (Notification.permission === "granted") {
                lanzarConDelay();
            } 
            else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permiso => {
                    if (permiso === "granted") {
                        lanzarConDelay();
                    }
                });
            } 
            else {
                alert("Tienes bloqueadas las notificaciones 😢");
            }

        });
    </script>

</body>
</html>
